<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Midnight Rooftop Run - 꼬마 고양이의 루프탑 달리기</title>
  <meta name="description" content="지붕 위를 달리는 귀여운 고양이의 점프 게임! 크롬 공룡 게임 스타일의 오프라인 감성 캐주얼 게임을 모바일과 PC에서 즐겨보세요.">
  
  <!-- SEO & Open Graph -->
  <meta property="og:title" content="Midnight Rooftop Run">
  <meta property="og:description" content="지붕 위를 달리는 귀여운 고양이의 점프 게임! 모바일 터치 완벽 지원.">
  <meta property="og:type" content="website">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-wrapper">
    <div id="game-container">
      
      <!-- Canvas for rendering game elements -->
      <canvas id="gameCanvas" width="800" height="400"></canvas>
      
      <!-- HUD (Heads-Up Display) -->
      <div id="hud" class="ui-panel">
        <div class="score-container">
          <div class="score-label">SCORE</div>
          <div id="current-score" class="score-value">00000</div>
        </div>
        <div class="score-container">
          <div class="score-label">HI-SCORE</div>
          <div id="high-score" class="score-value">00000</div>
        </div>
        <div class="hud-buttons">
          <button id="btn-sound" class="hud-btn" aria-label="음소거 토글" title="소리 켜기/끄기">
            <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
              <path id="sound-icon-path" fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <button id="btn-pause" class="hud-btn" aria-label="일시정지" title="일시정지">
            <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
              <path id="pause-icon-path" fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
        </div>
      </div>
      
      <!-- Start / Main Screen -->
      <div id="screen-start" class="screen-overlay active">
        <div class="glass-card">
          <div class="logo-area">
            <div class="cat-logo-svg">
              <!-- Inline SVG cat preview -->
              <svg viewBox="0 0 100 100" width="80" height="80">
                <path fill="#ffffff" d="M20,70 Q25,30 40,30 Q50,45 60,30 Q75,30 80,70 C75,80 25,80 20,70 Z"/>
                <path fill="#ffd23f" d="M35,50 A5,5 0 1,1 35,49 Z M65,50 A5,5 0 1,1 65,49 Z"/>
                <path fill="#ff8ba7" d="M47,58 L53,58 L50,62 Z"/>
                <path stroke="#ffffff" stroke-width="2" fill="none" d="M15,75 Q22,88 20,95"/>
                <path fill="#ffffff" d="M32,32 L20,10 L38,24 Z M68,32 L80,10 L62,24 Z"/>
              </svg>
            </div>
            <h1 class="game-title">Midnight Rooftop</h1>
            <p class="game-subtitle">Run, Cat, Run!</p>
          </div>
          
          <button id="btn-start" class="btn-primary">게임 시작</button>
          
          <div class="controls-guide">
            <div class="guide-item desktop">
              <div class="keys">
                <span class="key">Space</span> / <span class="key">↑</span>
              </div>
              <span class="guide-text">점프</span>
            </div>
            <div class="guide-item desktop">
              <div class="keys">
                <span class="key">↓</span> / <span class="key">S</span>
              </div>
              <span class="guide-text">엎드리기</span>
            </div>
            <div class="guide-item mobile">
              <div class="touch-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="5" y="2" width="14" height="20" rx="3" />
                  <circle cx="12" cy="18" r="1" />
                  <path d="M12 8v4M10 10h4" stroke-linecap="round" />
                </svg>
              </div>
              <span class="guide-text">화면 탭: 점프 (공중에서 다시 탭하면 고속 착지!)</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Pause Screen -->
      <div id="screen-pause" class="screen-overlay">
        <div class="glass-card small">
          <h2 class="screen-title">일시 정지</h2>
          <p class="screen-subtitle">잠시 쉬는 중...</p>
          <button id="btn-resume" class="btn-primary">계속하기</button>
        </div>
      </div>
      
      <!-- Game Over Screen -->
      <div id="screen-gameover" class="screen-overlay">
        <div class="glass-card">
          <h2 class="gameover-title">GAME OVER</h2>
          <p class="gameover-quote">"고양이가 지쳐서 잠들었습니다..."</p>
          
          <div class="results-container">
            <div class="result-row">
              <span>최종 점수:</span>
              <span id="final-score" class="result-val">00000</span>
            </div>
            <div class="result-row">
              <span>최고 점수:</span>
              <span id="final-high" class="result-val highlight">00000</span>
            </div>
          </div>
          
          <button id="btn-restart" class="btn-primary">다시 달리기</button>
        </div>
      </div>

    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
